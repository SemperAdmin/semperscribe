name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      # LibreOffice renders the DOCX half of the pagination parity test.
      # Liberation fonts are metric-compatible with TNR / Courier New.
      - name: Install LibreOffice and Liberation fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libreoffice-writer fonts-liberation

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
